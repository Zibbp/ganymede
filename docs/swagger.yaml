            $ref: '#/definitions/utils.ErrorResponse'
      security:
      - ApiKeyCookieAuth: []
      summary: Create an API key
      tags:
      - admin
  /admin/api-keys/{id}:
    delete:
      description: Soft-deletes an API key by setting revoked_at. The verification
        cache is flushed so the key stops authenticating immediately.
